services:
  mapa-mental:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - data:/data
      - uploads:/app/uploads
    environment:
      - DB_PATH=/data/mindmap.db
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:8000}
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
    restart: unless-stopped

volumes:
  data:
  uploads:
